services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kayakarya

  web:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kayakarya

volumes:
  uploads_data:

networks:
  kayakarya:
    driver: bridge
