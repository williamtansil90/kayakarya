upstream kayakarya_app {
    server 127.0.0.1:8002;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name kayakarya.com www.kayakarya.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kayakarya.com www.kayakarya.com;

    ssl_certificate /etc/letsencrypt/live/kayakarya.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kayakarya.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://kayakarya_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
